<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watashi Tool | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff3333;
            --bg: #030303;
            --card: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        body {
            margin: 0;
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1e0808 0%, #030303 100%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1000px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8);
            transition: transform 0.1s ease-out;
            position: relative;
            animation: slideUp 0.8s var(--transition);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Language Switcher */
        .lang-box { position: absolute; top: 25px; right: 25px; display: flex; gap: 8px; }
        .lang-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 51, 51, 0.2);
            color: #fff;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            transition: var(--transition);
        }
        .lang-btn.active { 
            background: var(--accent); 
            border-color: var(--accent); 
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
            color: #000;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { color: #666; font-size: 0.8rem; margin: 8px 0 30px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle b { color: var(--accent); }

        .section-title {
            text-align: left;
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 700;
            margin: 25px 0 12px 5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.9;
        }

        input, .main-btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            box-sizing: border-box;
            font-size: 1rem;
            transition: var(--transition);
        }

        input {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.1);
        }

        .main-btn {
            background: #ffffff;
            color: #000000;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
