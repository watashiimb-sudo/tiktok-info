<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watashi Tool | Official</title>
    <style>
        :root {
            --accent: #ff3333;
            --bg: #030303;
            --card: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        body {
            margin: 0;
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1e0808 0%, #030303 100%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1200px;
        }

        .container {
            max-width: 440px;
            width: 92%;
            padding: 40px;
            background: var(--card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            will-change: transform;
            position: relative;
        }

        /* Заголовок с flex-макетом для выравнивания переключателя языков */
        .header-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        /* Столбец заголовка с логотипом W */
        .logo-and-title {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .w-logo-wrapper {
            margin-bottom: 15px;
            display: inline-block;
        }

        /* Светящийся красный квадрат с буквой W */
        .w-logo {
            width: 70px;
            height: 70px;
            background: rgba(255, 51, 51, 0.1);
            border: 2px solid var(--accent);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            color: var(--accent);
            filter: drop-shadow(0 0 15px rgba(255, 51, 51, 0.7));
            transition: var(--transition);
        }

        .w-logo:hover {
            filter: drop-shadow(0 0 25px rgba(255, 51, 51, 1));
        }

        h1 {
            font-size: 26px;
            letter-spacing: 6px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            font-weight: 900;
            position: relative;
        }

        /* Disclaimer об авторстве */
        .disclaimer {
            font-size: 10px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0;
        }

        .disclaimer span {
            color: var(--accent);
            font-weight: bold;
        }

        /* Переключатель языков */
        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #777;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 800;
            transition: var(--transition);
        }

        .lang-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
        }

        /* Список правил */
        .rules-list {
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 20px 20px 20px 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            font-size: 13px;
            color: #bbb;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .rules-list li span { color: var(--accent); font-weight: bold; }

        input[type="file"] {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: #fff;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 20px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--accent);
            color: #fff;
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 51, 51, 0.4);
        }

        .progress-wrapper {
            margin-top: 25px;
            display: none;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #fff, var(--accent));
            transition: width 0.4s ease;
        }

        #console {
            background: #000;
            border-radius: 16px;
            padding: 15px;
            text-align: left;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            color: #00ff00;
            min-height: 80px;
        }

        .internal-link { font-size: 10px; color: #333; text-decoration: none; margin-top: 25px; display: block; }
    </style>
</head>
<body>

    <div class="container" id="card">
        <div class="header-group">
            <div class="logo-and-title">
                <div class="w-logo-wrapper">
                    <div class="w-logo">W</div>
                </div>
                <h1>WATASHI TOOL</h1>
                <div class="disclaimer" id="author-text">ATTENTION: <span>БЕСПЛАТНЫЙ</span>. Author (<span>ваташи</span>).</div>
            </div>
            <div class="lang-switch">
                <span class="lang-btn active" id="btn-ru" onclick="setLang('ru')">RU</span>
                <span class="lang-btn" id="btn-en" onclick="setLang('en')">EN</span>
            </div>
        </div>

        <ul class="rules-list" id="rules"><li>Используйте <span>Topaz/Wink</span> для качества.</li>
                        <li>Загрузите видео для <span>инъекции данных</span>.</li>
                        <li>Загрузите в TikTok через <span>браузер (ПК)</span>.</li></ul>

        <input type="file" id="vid-input" accept="video/mp4">
        <button class="btn" id="action-btn" onclick="processVideo()">Запустить процесс</button>

        <div class="progress-wrapper" id="p-wrapper" style="display: none;">
            <div class="progress-container">
                <div class="progress-bar" id="p-bar" style="width: 0%;"></div>
            </div>
            <div id="console"></div>
        </div>
        
        <a href="https://wtsh-tiktok-fps.neocities.org/#" class="internal-link">Engine v3.2 | Official Build</a>
    </div>

    <script>
        // --- Логика наклона ---
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 60;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 60;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // --- Переключение языков ---
        const translations = {
            ru: {
                author: 'ВНИМАНИЕ: Этот инструмент <span>БЕСПЛАТНЫЙ</span>. Уважайте автора (<span>ваташи</span>).',
                rules: `<li>Используйте <span>Topaz/Wink</span> для качества.</li>
                        <li>Загрузите видео для <span>инъекции данных</span>.</li>
                        <li>Загрузите в TikTok через <span>браузер (ПК)</span>.</li>`,
                btn: "Запустить процесс",
                logs: ["Инициализация...", "Анализ видео...", "Получение данных...", "Исправление структуры...", "Патчи: ", "Сохранение...", "Готово!"]
            },
            en: {
                author: 'ATTENTION: This tool is <span>FREE</span>. Respect the author (<span>watashi</span>).',
                rules: `<li>Use <span>Topaz/Wink</span> for quality.</li>
                        <li>Upload video for <span>data injection</span>.</li>
                        <li>Upload to TikTok via <span>browser (PC)</span>.</li>`,
                btn: "Start Process",
                logs: ["Initializing...", "Analyzing video...", "Receiving data...", "Fixing structure...", "Patches: ", "Saving...", "Complete!"]
            }
        };

        let currentLang = 'ru';

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('author-text').innerHTML = translations[lang].author;
            document.getElementById('rules').innerHTML = translations[lang].rules;
            document.getElementById('action-btn').innerText = translations[lang].btn;
        }

        // --- Обработка видео ---
        function addLog(text) {
            const consoleDiv = document.getElementById('console');
            const entry = document.createElement('div');
            entry.innerText = `> ${text}`;
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        async function processVideo() {
            const input = document.getElementById('vid-input');
            if (!input.files.length) return;

            const file = input.files[0];
            const wrapper = document.getElementById('p-wrapper');
            const pBar = document.getElementById('p-bar');
            const consoleDiv = document.getElementById('console');
            
            wrapper.style.display = 'block';
            consoleDiv.innerHTML = '';
            
            const logs = translations[currentLang].logs;
            const sleep = ms => new Promise(r => setTimeout(r, ms));

            addLog(logs[0]); pBar.style.width = '20%'; await sleep(600);
            addLog(logs[1]); pBar.style.width = '40%'; await sleep(800);

            try {
                const buffer = await file.arrayBuffer();
                const bytes = new Uint8Array(buffer);
                let count = 0;

                // Изменение байтов elst
                for (let i = 0; i < bytes.length - 3; i++) {
                    if (bytes[i] === 0x65 && bytes[i+1] === 0x6C && bytes[i+2] === 0x73 && bytes[i+3] === 0x74) {
                        count++;
                        bytes[i + 8] = 0x10; bytes[i + 9] = 0x00; bytes[i + 10] = 0x00; bytes[i + 11] = 0x01;
                    }
                }

                addLog(logs[2]); pBar.style.width = '60%'; await sleep(500);
                addLog(logs[3]); pBar.style.width = '80%'; await sleep(700);
                addLog(`${logs[4]} ${count}`); await sleep(400);

                if (count > 0) {
                    const blob = new Blob([bytes], { type: "video/mp4" });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = file.name.replace(".mp4", "_60fps.mp4");
                    link.click();
                    pBar.style.width = '100%'; await sleep(300);
                    addLog(logs[6]);
                } else {
                    addLog("No metadata atoms found.");
                    pBar.style.width = '100%';
                }
            } catch (e) {
                addLog("An error occurred during injection.");
            }
        }
    </script>
</body>
</html>
