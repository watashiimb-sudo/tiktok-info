<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watashi Tool | Official</title>
    <style>
        :root {
            --accent: #000000; /* Черный акцент */
            --bg: #030303;
            --card: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        body {
            margin: 0;
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #030303 100%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 440px;
            width: 92%;
            padding: 40px;
            background: var(--card);
            backdrop-filter: blur(30px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; /* Всё по центру */
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Центрированная шапка */
        .header-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        .w-logo {
            width: 65px;
            height: 65px;
            background: #ffffff; /* Белый фон для черной буквы */
            border: 2px solid #000;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 900;
            color: #000000; /* Черная W */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 5px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        .disclaimer { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 8px; }
        .disclaimer span { color: #fff; font-weight: bold; }

        /* Вкладки */
        .tabs { display: flex; gap: 10px; margin: 25px 0; }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #777;
            border-radius: 14px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .tab-btn.active {
            background: #ffffff;
            color: #000;
            border-color: #ffffff;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        input {
            width: 100%;
            padding: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: #fff;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 20px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover { transform: scale(1.02); background: #f0f0f0; }

        /* Результаты анализа (Центрированные) */
        .results { 
            background: rgba(0,0,0,0.3); 
            padding: 20px; 
            border-radius: 20px; 
            margin-top: 15px; 
        }
        .res-item { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            margin: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }
        .res-item span:first-child { color: #888; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }

        .progress-wrapper { margin-top: 20px; }
        .p-container { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .p-bar { width: 0%; height: 100%; background: #fff; transition: width 0.3s; }
        #console { background: #000; padding: 12px; border-radius: 12px; font-family: monospace; font-size: 10px; color: #fff; min-height: 50px; text-align: left; opacity: 0.7; }

        .footer-link { font-size: 10px; color: #444; text-decoration: none; margin-top: 30px; display: block; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-group">
            <div class="w-logo">W</div>
            <h1>WATASHI TOOL</h1>
            <div class="disclaimer">Engine: <span>v3.5</span> | Dev: <span>ваташи</span></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-inject')" id="t-btn-i">Изменение</button>
            <button class="tab-btn" onclick="switchTab('tab-analyze')" id="t-btn-a">Анализ</button>
        </div>

        <div id="tab-inject" class="tab-content active">
            <input type="file" id="vid-input" accept="video/mp4">
            <button class="btn" onclick="processVideo()">Inject Data</button>
            <div class="progress-wrapper" id="p-wrapper" style="display: none;">
                <div class="p-container"><div class="p-bar" id="p-bar"></div></div>
                <div id="console"></div>
            </div>
        </div>

        <div id="tab-analyze" class="tab-content">
            <input type="text" id="tk-link" placeholder="Ссылка на видео...">
            <button class="btn" onclick="analyzeVideo()">Get Info</button>
            <div class="results">
                <div class="res-item"><span>Качество</span> <span id="res-q">-</span></div>
                <div class="res-item"><span>FPS</span> <span id="res-f">-</span></div>
                <div class="res-item"><span>Размер</span> <span id="res-s">-</span></div>
            </div>
        </div>
        
        <a href="#" class="footer-link">WATASHI.TOOL.OFFICIAL</a>
    </div>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Стабильный Инъектор (Без крашей)
        async function processVideo() {
            const input = document.getElementById('vid-input');
            if (!input.files.length) return alert("Выберите файл!");
            
            const pBar = document.getElementById('p-bar');
            const consoleBox = document.getElementById('console');
            document.getElementById('p-wrapper').style.display = 'block';
            
            consoleBox.innerHTML = "> Инициализация...";
            pBar.style.width = "20%";

            try {
                const file = input.files[0];
                const buffer = await file.arrayBuffer();
                const bytes = new Uint8Array(buffer);
                let count = 0;

                await new Promise(r => setTimeout(r, 100)); // Даем браузеру "вздохнуть"

                const len = bytes.length - 12;
                for (let i = 0; i < len; i++) {
                    if (bytes[i] === 0x65 && bytes[i+1] === 0x6C && bytes[i+2] === 0x73 && bytes[i+3] === 0x74) {
                        count++;
                        bytes[i + 8] = 0x10; bytes[i + 9] = 0x00; bytes[i + 10] = 0x00; bytes[i + 11] = 0x01;
                        if (count % 400 === 0) await new Promise(r => setTimeout(r, 0));
                    }
                }

                pBar.style.width = "100%";
                consoleBox.innerHTML += `<br>> Патчи: ${count}<br>> Готово!`;

                if (count > 0) {
                    const blob = new Blob([bytes], { type: "video/mp4" });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = "FIXED_" + file.name;
                    a.click();
                }
            } catch (e) {
                alert("Ошибка памяти. Файл слишком большой.");
            }
        }

        // Анализ (Только Качество, FPS, Вес)
        async function analyzeVideo() {
            const link = document.getElementById('tk-link').value;
            if(!link) return;
            
            const ids = ['res-q', 'res-f', 'res-s'];
            ids.forEach(id => document.getElementById(id).innerText = "...");

            try {
                const res = await fetch(`https://tiktok-info-production-c7c2.up.railway.app/get_info?link=${encodeURIComponent(link)}`);
                const data = await res.json();
                
                if (data.status === "success") {
                    document.getElementById('res-q').innerText = data.quality || "1080p";
                    document.getElementById('res-f').innerText = data.fps || "60";
                    document.getElementById('res-s').innerText = data.size || "Unknown";
                } else {
                    ids.forEach(id => document.getElementById(id).innerText = "Error");
                }
            } catch(e) {
                ids.forEach(id => document.getElementById(id).innerText = "OFFLINE");
            }
        }
    </script>
</body>
</html>
