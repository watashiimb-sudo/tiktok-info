<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watashi Tool | Official</title>
    <style>
        :root {
            --accent: #ff3333;
            --bg: #030303;
            --card: rgba(255, 255, 255, 0.04);
            --text: #ffffff;
            --transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }

        body {
            margin: 0;
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1e0808 0%, #030303 100%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1200px;
        }

        .container {
            max-width: 440px;
            width: 92%;
            padding: 40px;
            background: var(--card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            position: relative;
        }

        /* Шапка */
        .header-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .logo-and-title {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .w-logo {
            width: 60px;
            height: 60px;
            background: rgba(255, 51, 51, 0.1);
            border: 2px solid var(--accent);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: 900;
            color: var(--accent);
            filter: drop-shadow(0 0 12px rgba(255, 51, 51, 0.6));
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        .disclaimer { font-size: 10px; color: #777; text-transform: uppercase; margin-top: 4px; }
        .disclaimer span { color: var(--accent); font-weight: bold; }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #777;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Список правил */
        .rules-list {
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 15px 15px 15px 35px;
            border-radius: 18px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #bbb;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .rules-list li span { color: var(--accent); font-weight: bold; }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 18px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 10px 25px rgba(255, 51, 51, 0.4);
        }

        /* Результаты анализа */
        .results {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            text-align: left;
        }
        .res-item { display: flex; justify-content: space-between; font-size: 12px; margin: 8px 0; }
        .res-item span:first-child { color: #555; }

        /* Консоль и Прогресс */
        .progress-wrapper { margin-top: 20px; }
        .p-container { width: 100%; height: 5px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .p-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
        #console { background: #000; padding: 12px; border-radius: 12px; font-family: monospace; font-size: 10px; color: #0f0; min-height: 60px; text-align: left; }

        .lang-switch { display: flex; gap: 8px; }
        .lang-btn { font-size: 10px; color: #555; cursor: pointer; font-weight: 800; padding: 5px 10px; border-radius: 8px; border: 1px solid transparent; }
        .lang-btn.active { color: #fff; border-color: var(--accent); }

        .footer-link { font-size: 10px; color: #333; text-decoration: none; margin-top: 25px; display: block; }
    </style>
</head>
<body>

    <div class="container" id="card">
        <div class="header-group">
            <div class="logo-and-title">
                <div class="w-logo">W</div>
                <h1>WATASHI TOOL</h1>
                <div class="disclaimer" id="author-text">ВНИМАНИЕ: <span>БЕСПЛАТНЫЙ</span>. Автор (<span>ваташи</span>).</div>
            </div>
            <div class="lang-switch">
                <span class="lang-btn active" id="btn-ru" onclick="setLang('ru')">RU</span>
                <span class="lang-btn" id="btn-en" onclick="setLang('en')">EN</span>
            </div>
        </div>

        <ul class="rules-list" id="rules">
            <li>Используйте <span>Topaz/Wink</span> для качества.</li>
            <li>Загрузите видео для <span>инъекции данных</span>.</li>
            <li>Загрузите в TikTok через <span>браузер (ПК)</span>.</li>
        </ul>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-inject')" id="t-btn-i">Изменение</button>
            <button class="tab-btn" onclick="switchTab('tab-analyze')" id="t-btn-a">Анализ</button>
        </div>

        <div id="tab-inject" class="tab-content active">
            <input type="file" id="vid-input" accept="video/mp4">
            <button class="btn" id="btn-i-main" onclick="processVideo()">Запустить процесс</button>
            
            <div class="progress-wrapper" id="p-wrapper" style="display: none;">
                <div class="p-container"><div class="p-bar" id="p-bar"></div></div>
                <div id="console"></div>
            </div>
        </div>

        <div id="tab-analyze" class="tab-content">
            <input type="text" id="tk-link" placeholder="Вставьте ссылку на TikTok...">
            <button class="btn" id="btn-a-main" onclick="analyzeVideo()">Анализировать</button>
            <div class="results">
                <div class="res-item"><span id="l-q">Качество:</span> <span id="res-q">-</span></div>
                <div class="res-item"><span id="l-f">FPS:</span> <span id="res-f">-</span></div>
                <div class="res-item"><span id="l-s">Вес:</span> <span id="res-s">-</span></div>
                <div class="res-item"><span id="l-c">Страна:</span> <span id="res-c">-</span></div>
            </div>
        </div>
        
        <a href="#" class="footer-link">Engine v3.2 | Official Build</a>
    </div>

    <script>
        // Наклон карточки
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 60;
            const y = (window.innerHeight / 2 - e.pageY) / 60;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        // Переключение вкладок
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'tab-inject') document.getElementById('t-btn-i').classList.add('active');
            else document.getElementById('t-btn-a').classList.add('active');
        }

        // Языки
        const langData = {
            ru: {
                author: 'ВНИМАНИЕ: Инструмент <span>БЕСПЛАТНЫЙ</span>. Автор (<span>ваташи</span>).',
                rules: '<li>Используйте <span>Topaz/Wink</span> для качества.</li><li>Загрузите видео для <span>инъекции данных</span>.</li><li>Загрузите в TikTok через <span>браузер (ПК)</span>.</li>',
                btnI: "Запустить процесс", btnA: "Анализировать",
                tabI: "Изменение", tabA: "Анализ",
                ph: "Вставьте ссылку на TikTok...",
                q: "Качество:", f: "FPS:", s: "Вес:", c: "Страна:"
            },
            en: {
                author: 'ATTENTION: Tool is <span>FREE</span>. Author (<span>watashi</span>).',
                rules: '<li>Use <span>Topaz/Wink</span> for quality.</li><li>Upload video for <span>data injection</span>.</li><li>Upload to TikTok via <span>browser (PC)</span>.</li>',
                btnI: "Start Process", btnA: "Analyze Link",
                tabI: "Modify", tabA: "Analyze",
                ph: "Paste TikTok link...",
                q: "Quality:", f: "FPS:", s: "Size:", c: "Country:"
            }
        };

        let curLang = 'ru';
        function setLang(l) {
            curLang = l;
            document.getElementById('btn-ru').classList.toggle('active', l==='ru');
            document.getElementById('btn-en').classList.toggle('active', l==='en');
            const d = langData[l];
            document.getElementById('author-text').innerHTML = d.author;
            document.getElementById('rules').innerHTML = d.rules;
            document.getElementById('btn-i-main').innerText = d.btnI;
            document.getElementById('btn-a-main').innerText = d.btnA;
            document.getElementById('t-btn-i').innerText = d.tabI;
            document.getElementById('t-btn-a').innerText = d.tabA;
            document.getElementById('tk-link').placeholder = d.ph;
            document.getElementById('l-q').innerText = d.q;
            document.getElementById('l-f').innerText = d.f;
            document.getElementById('l-s').innerText = d.s;
            document.getElementById('l-c').innerText = d.c;
        }

        // Логика Изменения (Инъекция)
        async function processVideo() {
            const input = document.getElementById('vid-input');
            if(!input.files.length) return alert("Файл не выбран!");
            
            const wrapper = document.getElementById('p-wrapper');
            const pBar = document.getElementById('p-bar');
            const consoleBox = document.getElementById('console');
            
            wrapper.style.display = 'block';
            consoleBox.innerHTML = "> Инициализация...";
            pBar.style.width = "30%";

            const file = input.files[0];
            const buffer = await file.arrayBuffer();
            const bytes = new Uint8Array(buffer);
            let count = 0;

            for (let i = 0; i < bytes.length - 3; i++) {
                if (bytes[i] === 0x65 && bytes[i+1] === 0x6C && bytes[i+2] === 0x73 && bytes[i+3] === 0x74) {
                    count++;
                    bytes[i + 8] = 0x10; bytes[i + 9] = 0x00; bytes[i + 10] = 0x00; bytes[i + 11] = 0x01;
                }
            }

            setTimeout(() => {
                pBar.style.width = "100%";
                consoleBox.innerHTML += `<br>> Патчи: ${count}<br>> Успешно завершено!`;
                if(count > 0) {
                    const blob = new Blob([bytes], { type: "video/mp4" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "WATASHI_FIX_" + file.name;
                    a.click();
                }
            }, 1000);
        }

        // Логика Анализа
        async function analyzeVideo() {
            const link = document.getElementById('tk-link').value;
            if(!link) return alert("Введите ссылку!");
            
            document.getElementById('res-q').innerText = "...";
            try {
                const res = await fetch(`https://tiktok-info-production-c7c2.up.railway.app/get_info?link=${encodeURIComponent(link)}`);
                const data = await res.json();
                if(data.status === "success") {
                    document.getElementById('res-q').innerText = data.quality;
                    document.getElementById('res-f').innerText = data.fps;
                    document.getElementById('res-s').innerText = data.size;
                    document.getElementById('res-c').innerText = data.country;
                }
            } catch(e) { alert("Ошибка сервера!"); }
        }
    </script>
</body>
</html>
